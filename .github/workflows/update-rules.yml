name: 毎週月曜 ガイドライン更新チェック

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 09:00 JST (UTC 00:00)
  workflow_dispatch:        # 手動実行も可能

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ガイドライン取得スクリプト実行
        run: python scripts/fetch_rules.py

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add rules.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            UPDATES=$(python -c "
          import json
          with open('rules.json') as f:
              d = json.load(f)
          updates = d.get('updates_detected', [])
          print('更新検出: ' + ', '.join(updates) if updates else '内容確認・更新なし')
          ")
            git commit -m "🔄 ガイドライン自動更新 $(date '+%Y-%m-%d') - $UPDATES"
            git push
            echo "✅ rules.json を更新してプッシュしました"
          fi
