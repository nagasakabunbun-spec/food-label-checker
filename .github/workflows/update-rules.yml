name: 毎週月曜 ガイドライン更新＆ルール検証

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 09:00 JST (UTC 00:00)
  workflow_dispatch:        # 手動実行も可能

jobs:
  update-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 1: 消費者庁サイトからガイドライン取得 ──
      - name: ① ガイドライン取得（消費者庁・厚労省サイト巡回）
        run: python scripts/fetch_rules.py

      # ── Step 2: システムプロンプトの内部ルールをAI検証 ──
      - name: ② 内部ルール整合性検証（Groq AI）
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/validate_rules.py

      # ── Step 3: 変更をコミット・プッシュ ──
      - name: ③ 変更をコミット＆プッシュ
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add rules.json validation-report.json

          # 変更の概要を作成
          GUIDE_STATUS=$(python -c "
          import json
          with open('rules.json') as f:
              d = json.load(f)
          updates = d.get('updates_detected', [])
          print('ガイドライン更新あり: ' + ', '.join(updates) if updates else 'ガイドライン変更なし')
          ")

          VALID_STATUS=$(python -c "
          import json
          with open('validation-report.json') as f:
              d = json.load(f)
          c = d.get('critical_count', 0)
          w = d.get('warning_count', 0)
          if c > 0:
              print(f'⚠️ 重大な問題{c}件・警告{w}件を検出')
          elif w > 0:
              print(f'💡 警告{w}件を検出')
          else:
              print('✅ ルール検証問題なし')
          ")

          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "🔄 週次自動チェック $(date '+%Y-%m-%d') | $GUIDE_STATUS | $VALID_STATUS"
            git push
            echo "✅ プッシュ完了"
          fi

      # ── Step 4: 重大な問題があればGitHub Issueを作成 ──
      - name: ④ 重大な問題をIssueで通知
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CRITICAL=$(python -c "
          import json
          with open('validation-report.json') as f:
              d = json.load(f)
          print(d.get('critical_count', 0))
          ")
          if [ "$CRITICAL" -gt "0" ]; then
            DATE=$(date '+%Y-%m-%d')
            BODY=$(python -c "
          import json
          with open('validation-report.json') as f:
              d = json.load(f)
          lines = ['## ⚠️ 食品表示ルール検証で重大な問題が検出されました', '']
          lines.append(f'**検証日:** {d[\"validated_at\"]}')
          lines.append(f'**重大な問題:** {d[\"critical_count\"]}件')
          lines.append(f'**警告:** {d[\"warning_count\"]}件')
          lines.append('')
          lines.append('### 重大な問題一覧')
          for i in d.get('critical_issues', []):
              lines.append(f'#### {i.get(\"item\", \"\")}')
              lines.append(f'- **現在の記述:** {i.get(\"current\", \"\")}')
              lines.append(f'- **正しい記述:** {i.get(\"correct\", \"\")}')
              lines.append(f'- **理由:** {i.get(\"reason\", \"\")}')
              lines.append('')
          if d.get('warnings'):
              lines.append('### 警告一覧')
              for w in d.get('warnings', []):
                  lines.append(f'- **{w.get(\"item\", \"\")}**: {w.get(\"reason\", \"\")}')
          lines.append('')
          lines.append(f'**総合評価:** {d.get(\"overall_assessment\", \"\")}')
          lines.append('')
          lines.append('> このIssueはGitHub Actionsによって自動作成されました。')
          print('\n'.join(lines))
          ")
            gh issue create \
              --title "⚠️ [$DATE] 食品表示ルール検証：重大な問題 ${CRITICAL}件検出" \
              --body "$BODY" \
              --label "bug" || echo "Issue作成をスキップ（ラベルなし）"
          else
            echo "重大な問題なし。Issueは作成しません。"
          fi
